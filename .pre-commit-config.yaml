repos:
- repo: local
  hooks:
    - id: ruff
      name: ruff
      entry: uv run ruff check --fix
      language: system
      types_or: [python, pyi]
      stages: [pre-commit]

    - id: ruff-format
      name: ruff-format
      entry: uv run ruff format
      language: system
      types_or: [python, pyi]
      stages: [pre-commit]

    - id: mypy
      name: mypy
      entry: uv run mypy --config-file=pyproject.toml
      language: system
      types_or: [python, pyi]
      pass_filenames: true
      stages: [pre-commit]

    - id: deptry
      name: deptry
      entry: uv run deptry .
      language: system
      pass_filenames: false
      files: ^(metriq_gym/.*\.py|tests/.*\.py|docs/generate_cli_docs\.py|pyproject\.toml|uv\.lock)$
      stages: [pre-commit]
